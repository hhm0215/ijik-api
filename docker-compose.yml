services:
  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Traefik이 앞단인 서버용 — PUBLIC_HOST 미설정(로컬 등)이면 라우터가 매칭되지 않아 무해
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ijik-api.entrypoints=websecure"
      - "traefik.http.routers.ijik-api.rule=Host(`${PUBLIC_HOST:-localhost}`)"
      - "traefik.http.routers.ijik-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.ijik-api.loadbalancer.server.port=3000"

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ijik_db
      MYSQL_USER: ijik
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
